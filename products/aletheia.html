<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alētheia™ Sovereign Chain Listeners — Archer Chain Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=IBM+Plex+Mono:wght@300;400;500;600&amp;family=Barlow:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root{--void:#030304;--gold:#a6894c;--gold-dim:rgba(166,137,76,0.12);--red:#FF0000;--mid:#888890;--white:#f0f0f4;--green:#4caf82;--mono:'IBM Plex Mono',monospace;--display:'Cinzel',serif;--body:'Barlow',sans-serif;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--void);color:var(--white);font-family:var(--body);line-height:1.7;overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh;}
        .corporate-header{width:100%;padding:15px 40px 5px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);}
        .header-center{font-family:var(--display);font-size:10px;letter-spacing:4px;font-weight:600;}
        .gold-line{width:100%;height:1px;background:var(--gold);opacity:0.6;}
        .site-nav{width:100%;background:#0a0a0d;border-bottom:1px solid rgba(166,137,76,0.3);position:relative;z-index:100;}
        .nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:stretch;padding:0 40px;}
        .nav-item{position:relative;}
        .nav-trigger{display:flex;align-items:center;gap:8px;padding:18px 28px;font-family:var(--mono);font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);cursor:pointer;border:none;background:none;transition:background 0.2s;white-space:nowrap;}
        .nav-trigger:hover{background:var(--gold-dim);}
        .nav-trigger .chevron{font-size:7px;opacity:0.6;transition:transform 0.2s;display:inline-block;}
        .nav-item:hover .chevron{transform:rotate(180deg);}
        .nav-dropdown{display:none;position:absolute;top:100%;left:0;min-width:280px;background:#0d0d10;border:1px solid rgba(166,137,76,0.25);border-top:2px solid var(--gold);z-index:200;}
        .nav-item:hover .nav-dropdown{display:block;}
        .nav-dropdown a{display:block;padding:14px 24px;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mid);text-decoration:none;border-bottom:1px solid rgba(166,137,76,0.08);transition:color 0.2s,background 0.2s;}
        .nav-dropdown a:hover{color:var(--gold);background:var(--gold-dim);}
        .nav-dropdown a:last-child{border-bottom:none;}
        .dd-label{display:block;padding:10px 24px 6px;font-family:var(--mono);font-size:7px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(166,137,76,0.4);border-bottom:1px solid rgba(166,137,76,0.1);}
        a{color:inherit;text-decoration:none;}
        .prod-hero{padding:80px 60px 60px;max-width:1100px;margin:0 auto;width:100%;}
        .prod-eyebrow{font-family:var(--mono);font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);opacity:0.7;margin-bottom:16px;}
        .prod-name{font-family:var(--display);font-size:clamp(2rem,4.5vw,4rem);letter-spacing:0.12em;color:var(--white);text-transform:uppercase;font-weight:400;line-height:1.2;margin-bottom:12px;}
        .prod-name em{color:var(--gold);font-style:normal;}
        .prod-tagline{font-family:var(--mono);font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--mid);margin-bottom:20px;}
        .prod-status{display:inline-block;padding:5px 16px;border:1px solid rgba(166,137,76,0.4);font-family:var(--mono);font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);}
        .gold-rule{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0.35;}
        .prod-body{max-width:1100px;margin:0 auto;padding:60px 60px 120px;flex-grow:1;}
        .not-ai-block{background:#060408;border:1px solid rgba(166,137,76,0.2);border-left:3px solid var(--gold);padding:40px 48px;margin-bottom:72px;}
        .not-ai-block .na-label{font-family:var(--mono);font-size:8px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;opacity:0.8;}
        .not-ai-block p{font-family:var(--body);font-size:1.05rem;font-weight:300;line-height:2.2;letter-spacing:0.06em;color:var(--mid);}
        .not-ai-block p strong{color:var(--white);font-weight:500;}
        .section-block{margin-bottom:72px;}
        .section-block .sb-label{font-family:var(--mono);font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);opacity:0.6;margin-bottom:12px;}
        .section-block h2{font-family:var(--display);font-size:1.7rem;letter-spacing:0.12em;color:var(--gold);text-transform:uppercase;margin-bottom:28px;line-height:1.3;}
        .section-block p{font-family:var(--body);font-size:1.05rem;font-weight:300;line-height:2.2;letter-spacing:0.06em;color:var(--mid);margin-bottom:20px;max-width:820px;}
        .section-block p strong{color:var(--white);font-weight:500;}
        
        .architecture-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin:32px 0;}
        .arch-card{background:#060408;border:1px solid rgba(166,137,76,0.1);padding:32px;border-top:2px solid rgba(166,137,76,0.2);transition:border-color 0.3s;}
        .arch-card:hover{border-top-color:var(--gold);}
        .arch-card h3{font-family:var(--display);font-size:1.1rem;letter-spacing:0.1em;color:var(--white);margin-bottom:16px;text-transform:uppercase;}
        .arch-card ul{list-style:none;padding:0;}
        .arch-card li{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;color:var(--mid);padding:6px 0;text-transform:uppercase;}
        .arch-card li::before{content:"// ";color:var(--gold);opacity:0.6;}

        .spec-table{width:100%;border-collapse:collapse;margin:32px 0;font-family:var(--mono);}
        .spec-table th{text-align:left;padding:12px 20px;font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid rgba(166,137,76,0.3);opacity:0.8;}
        .spec-table td{padding:14px 20px;font-size:10px;letter-spacing:0.1em;color:var(--mid);border-bottom:1px solid rgba(166,137,76,0.08);vertical-align:top;line-height:1.7;}
        .spec-table td:first-child{color:var(--white);font-weight:500;}
        .spec-table tr:last-child td{border-bottom:none;}
        
        .search-container{margin:32px 0 16px;}
        .search-box{width:100%;background:#060408;border:1px solid rgba(166,137,76,0.3);padding:14px 20px;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--white);outline:none;transition:border-color 0.2s;}
        .search-box:focus{border-color:var(--gold);}
        
        .index-wrapper{height:400px;overflow-y:auto;border:1px solid rgba(166,137,76,0.15);background:#050507;padding:20px;margin-bottom:16px;}
        .index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
        .index-item{font-family:var(--mono);font-size:10px;letter-spacing:0.05em;color:var(--mid);padding:6px 12px;background:#09090d;border-left:2px solid rgba(166,137,76,0.2);display:flex;align-items:center;transition:opacity 0.2s;}
        .index-item.hidden{display:none;}
        .index-item span{color:var(--gold);margin-right:8px;font-size:8px;opacity:0.6;}
        
        .pricing-block{background:#060408;border:1px solid rgba(166,137,76,0.15);padding:40px 48px;margin-top:40px;}
        .pricing-block .pb-label{font-family:var(--mono);font-size:8px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;opacity:0.8;}
        .pricing-block p{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--mid);line-height:2;margin-bottom:20px;}
        .cta-btn{display:inline-block;margin-top:28px;padding:14px 36px;border:1px solid var(--gold);font-family:var(--mono);font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);transition:background 0.2s,color 0.2s;cursor:pointer;}
        .cta-btn:hover{background:var(--gold);color:var(--void);}
        
        .acerbe-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border:1px solid rgba(166,137,76,0.2);font-family:var(--mono);font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-top:40px;}
        .acerbe-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse2 2s ease-in-out infinite;}
        @keyframes pulse2{0%,100%{opacity:0.3}50%{opacity:1}}
        footer{width:100%;padding:0 40px 20px;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-top:auto;}
        .footer-line{width:100%;height:1px;background:var(--gold);opacity:0.6;margin-bottom:12px;}
        .footer-content{display:flex;justify-content:space-between;align-items:center;}
        .footer-center{font-family:var(--display);font-size:9px;letter-spacing:3px;}
    </style>
</head>
<body>
<div class="corporate-header"><div>BIN754975035</div><div class="header-center">Archer Chain Analytics</div><div>GST/HST754975035RT0
